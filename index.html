<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://rhjsweets.com/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #1c2430;
            --muted: #6b7684;
            --line: #d9dee5;
            --bg: #fbfcfd;
            --accent: #0f6b5c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            max-width: 560px;
            width: 100%;
            text-align: center;
        }

        .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 999px;
            padding: 6px 16px;
            margin-bottom: 32px;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(34px, 7vw, 52px);
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
            word-break: break-word;
        }

        p {
            font-size: 16px;
            line-height: 1.7;
            color: var(--muted);
            margin-bottom: 36px;
        }

        .contact {
            border-top: 1px solid var(--line);
            padding-top: 32px;
        }

        .contact-label {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .phone {
            display: inline-block;
            font-size: 22px;
            font-weight: 500;
            color: var(--ink);
            text-decoration: none;
        }

        .phone:hover { color: var(--accent); }

        footer {
            margin-top: 48px;
            font-size: 13px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main class="card">
        
        <h1>rhjsweets.com</h1>
        <p>Coming Sooooooooooooooooonnnnnnnnnnm</p>
        <div class="contact">
            <div class="contact-label">Contact</div>
            <a class="phone" href="tel:+917837993323">+91 78379 93323</a>

        <footer>&copy; 2026 rhjsweets.com</footer>
